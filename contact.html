<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plonk's Blog - 联系我</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Plonk's Blog</a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">关于</a></li>
                <li><a href="tools.html">工具箱</a></li>
                <li><a href="contact.html" class="active">联系</a></li>
            </ul>
            <button class="menu-toggle" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- 联系页面主体 -->
    <section class="contact-page">
        <div class="container">
            <h1 class="page-title">联系我</h1>
            <p class="page-subtitle">有任何建议或想法？欢迎给我发送邮件，我会尽快回复！</p>

            <div class="contact-wrapper">
                <div class="contact-form-container">
                    <form id="contactForm" class="contact-form">
                        <div class="form-group">
                            <label for="name">姓名</label>
                            <input type="text" id="name" name="name" placeholder="你的名字" required>
                        </div>
                        <div class="form-group">
                            <label for="email">邮箱</label>
                            <input type="email" id="email" name="email" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="subject">主题</label>
                            <input type="text" id="subject" name="subject" placeholder="邮件主题" required>
                        </div>
                        <div class="form-group">
                            <label for="message">消息</label>
                            <textarea id="message" name="message" rows="6" placeholder="在这里写下你的建议或想法..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-submit">
                            <span class="btn-text">发送邮件</span>
                            <span class="btn-loading" style="display:none">发送中...</span>
                        </button>
                    </form>
                    <div id="formSuccess" class="form-success" style="display:none">
                        <div class="success-icon">&#10003;</div>
                        <h3>邮件已发送！</h3>
                        <p>感谢你的建议，我会尽快回复。</p>
                        <button class="btn btn-secondary" onclick="resetForm()">再发一封</button>
                    </div>
                </div>

                <div class="contact-info">
                    <div class="contact-card">
                        <h3>其他联系方式</h3>
                        <div class="contact-item">
                            <span class="contact-icon">&#9993;</span>
                            <div>
                                <strong>邮箱</strong>
                                <a href="mailto:2938115711@qq.com">2938115711@qq.com</a>
                            </div>
                        </div>
                        <div class="contact-item">
                            <span class="contact-icon">&#128187;</span>
                            <div>
                                <strong>GitHub</strong>
                                <a href="https://github.com/Plonkloving" target="_blank" rel="noopener">github.com/Plonkloving</a>
                            </div>
                        </div>
                        <p class="contact-note">
                            或者直接点击下方按钮，通过默认邮件客户端发送。
                        </p>
                        <a href="mailto:2938115711@qq.com" class="btn btn-secondary">直接发送邮件</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Plonk's Blog. All rights reserved.</p>
            <div class="social-links">
                <a href="https://github.com/Plonkloving" target="_blank" rel="noopener">GitHub</a>
                <a href="mailto:2938115711@qq.com">Email</a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
