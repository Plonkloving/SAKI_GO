<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plonk's Blog - 首页</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Plonk's Blog</a>
            <ul class="nav-links">
                <li><a href="index.html" class="active">首页</a></li>
                <li><a href="about.html">关于</a></li>
                <li><a href="contact.html">联系</a></li>
                <li><a href="admin.html">管理</a></li>
            </ul>
            <button class="menu-toggle" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- 英雄区 -->
    <header class="hero">
        <div class="container">
            <h1>欢迎来到我的博客</h1>
            <p>分享技术、生活与思考</p>
        </div>
    </header>

    <!-- 文章列表 -->
    <section class="posts-section">
        <div class="container">
            <h2 class="section-title">最近文章</h2>

            <!-- 搜索栏 -->
            <div class="search-bar">
                <div class="search-input-wrap">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" class="search-input" placeholder="搜索文章标题、摘要..." oninput="Blog.search(this.value)">
                </div>
                <select id="tagFilter" class="tag-filter" onchange="Blog.filterByTag(this.value)">
                    <option value="">全部分类</option>
                    <option value="技术">技术</option>
                    <option value="前端">前端</option>
                    <option value="后端">后端</option>
                    <option value="开源">开源</option>
                    <option value="思考">思考</option>
                    <option value="生活">生活</option>
                    <option value="资源">资源</option>
                    <option value="其他">其他</option>
                </select>
            </div>

            <div class="posts-grid" id="postsGrid">
                <!-- 文章由 js 动态渲染 -->
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination">
                <!-- 由 js 动态渲染 -->
            </div>
        </div>
    </section>

    <!-- 文章预览弹窗 -->
    <div class="modal-overlay" id="postModal" onclick="closePostModal(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="closePostModal()">&times;</button>
            <div class="modal-body" id="modalBody">
                <!-- 由 JS 动态填充 -->
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Plonk's Blog. All rights reserved.</p>
            <div class="social-links">
                <a href="https://github.com/Plonkloving" target="_blank" rel="noopener">GitHub</a>
                <a href="mailto:2938115711@qq.com">Email</a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
